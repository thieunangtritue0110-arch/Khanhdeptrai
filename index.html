<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <div class="top-background"></div>

        <div class="card-content">
            <div class="avatar-container">
                <img src="https://24hstore.vn/upload_images/images/hinh-nen-luffy-gear-5/hinh-nen-luffy-gear-5-dien-thoai/hinh-nen-luffy-gear-5-nika-sieu-ngau.jpg" alt="luffy avatar">
            </div>

            <h2 class="name">Hà minh khánh</h2>
            <p class="job">code developer </p>

            <div class="social-icons">
                <a href="#" class="icon facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="icon twitter"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="icon instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="icon youtube"><i class="fa-brands fa-youtube"></i></a>
            </div>

            <div class="action-buttons">
                <button class="btn btn-Me button-Me">Me</button>
                <button class="btn btn-myfamily button-myfamily">My family</button>
            </div>

            <div class="analytics">
                <div class="data-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>60k</span>
                </div>
                <div class="divider"></div>
                <div class="data-item">
                    <i class="fa-regular fa-comment"></i>
                    <span>20k</span>
                </div>
                <div class="divider"></div>
                <div class="data-item">
                    <i class="fa-solid fa-share"></i>
                    <span>12k</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
